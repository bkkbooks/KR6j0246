body:
  text: 西天譯經三藏朝散大夫試鴻臚少卿傳法大師臣施護奉詔譯如是我聞一時世尊在舍衛國祇樹給孤獨園爾時世尊告尊者阿難言阿難汝當諦聽我有六字大明王陀羅尼乃是過去無量諸佛為諸大士之所宣說阿難我今復為汝等及末世有情宣說是陀羅尼當使有情於未來世得此陀羅尼者而得大利爾時阿難及娑婆世界主大梵天王帝釋四天大王等白世尊言世尊大慈大悲願為宣說當令我等及末世有情於長夜中得利益安樂爾時世尊即說六字大明王陀羅尼曰怛儞也二合他引一難底隷引二摩度摩底三曼拏哩引計引四布哩引曩禰計引娑嚩二合引賀引五爾時佛告阿難言若有眾生得聞此大明王陀羅尼章句名字信心受持憶念讀誦及以香花種種供養者是人所有王怖水火等怖乃至盜賊怨家之怖如是諸怖悉皆解脫又復毒藥乃至刀兵亦不能傷害又復天人非人夜叉羅剎俱畔拏乃至羯吒布單曩等所持所魅亦不能侵害又復瘧病一日二日三日四日或復多日或復須臾又復頭痛耳痛脊痛腹痛乃至水腫諸惡病苦皆不能侵害於其晝夜常獲安隱一切所求皆得如願爾時世尊又說陀羅尼曰怛儞也二合他引一阿拏哩引二波拏哩引三那彌引那摩儞四嚩迦細引五俱酥計引六句引迦切計引七部多誐囉二合切引八帝濟引嚩底九野舍嚩底娑嚩二合引賀引十佛告阿難若有眾生得聞是陀羅尼者我不見有一切天龍夜叉羅剎畢哩多毘舍遮部多俱畔拏布單曩羯吒布單曩乃至人非人等一切行不饒益者敢有違逆阿難如是等行不饒益者若有違逆我如是陀羅尼者當頭破七分如阿梨樹枝爾時世尊復告阿難言如是陀羅尼功德力勢無量無邊利益眾生無有窮盡汝當受持廣令流布於後後世勿令斷絕佛說是經已阿難及大梵天王天帝釋四天大王等聞佛所說歡喜信受禮佛而退
